name: Enterprise EKS CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build --no-cache -t enterprise-eks-security-app ./src

      - name: Tag Docker Image
        run: docker tag enterprise-eks-security-app:latest 727646499790.dkr.ecr.us-east-1.amazonaws.com/enterprise-eks-security-app:latest

      - name: Push Docker Image
        run: docker push 727646499790.dkr.ecr.us-east-1.amazonaws.com/enterprise-eks-security-app:latest

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name enterprise-eks-security-cluster

      - name: Deploy Kubernetes Files
        run: kubectl apply -f k8s/deployment.yaml && kubectl apply -f k8s/service.yaml

      - name: Restart Kubernetes Deployment
        run: kubectl rollout restart deployment enterprise-eks-app -n enterprise-app

      - name: Verify Deployment
        run: kubectl rollout status deployment enterprise-eks-app -n enterprise-app